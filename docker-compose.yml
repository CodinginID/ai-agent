services:

  # ── Ollama: AI model server ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aiagent_ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Model init: pull model sekali, lalu selesai ─────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: aiagent_ollama_init
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen2.5:3b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── Bot: Telegram bot utama ──────────────────────────────────────────────────
  # image: dipakai saat `docker compose pull` (user yang install via install.sh)
  # build: dipakai saat `docker compose up --build` (developer lokal)
  bot:
    image: ghcr.io/codinginid/ai-agent:latest
    build: .
    container_name: aiagent_bot
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # Opsional: mount direktori project di VPS agar bot bisa ls/git di sana
    # volumes:
    #   - /path/ke/project/kamu:/workspace:ro

volumes:
  ollama_data:
    name: aiagent_ollama_data
