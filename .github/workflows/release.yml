name: Release

on:
  push:
    tags: ['v*']

# Flow:
#   test → build backend image  ─┐
#   test → build CLI binaries   ─┤→ deploy VPS → verify → GitHub Release
# GitHub Release hanya dibuat kalau semua container running di VPS.

jobs:
  # ── 0. Validasi kode sebelum image release dibuat ──────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt -q

      - name: Lint
        run: ruff check app/ tests/

      - name: Type check
        run: mypy app/

      - name: Unit test
        run: pytest tests/ -v

  # ── 1. Build & push image ke GHCR ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Login ke GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx (multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 1b. Build CLI binaries (cross-compile Go) ──────────────────────────────
  build-cli:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: octopus-cli/go.mod
          cache-dependency-path: octopus-cli/go.sum

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        working-directory: octopus-cli
        env:
          APP_URL: ${{ vars.OCTOPUS_APP_URL }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Fallback jika OCTOPUS_APP_URL belum di-set di GitHub repo vars
          APP_URL="${APP_URL:-http://localhost:8080}"
          mkdir -p dist
          LDFLAGS="-X main.defaultAppURL=${APP_URL} -X main.Version=${VERSION} -s -w"

          GOOS=linux   GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/octopus-linux-amd64   .
          GOOS=linux   GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/octopus-linux-arm64   .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/octopus-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="$LDFLAGS" -o dist/octopus-darwin-arm64  .
          GOOS=windows GOARCH=amd64  go build -ldflags="$LDFLAGS" -o dist/octopus-windows-amd64.exe .

          cp install.sh dist/octopus-install.sh

          echo "=== Built binaries ==="
          ls -lh dist/

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: octopus-cli-binaries
          path: octopus-cli/dist/
          retention-days: 1

  # ── 2. Deploy ke VPS (self-hosted runner di dalam VPS) ─────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: self-hosted
    needs: [build, build-cli]
    steps:
      - name: Pull kode & image terbaru, restart bot
        run: |
          set -e
          cd ~/ai-agent

          echo ">>> Sync kode..."
          git pull origin main

          echo ">>> Pull image baru dari GHCR..."
          docker compose pull bot

          echo ">>> Stop container lama..."
          docker compose down --remove-orphans

          echo ">>> Jalankan dengan image baru..."
          docker compose up -d

  # ── 3. Verifikasi semua container running di VPS ────────────────────────────
  verify:
    name: Verify Deployment
    runs-on: self-hosted
    needs: deploy
    steps:
      - name: Tunggu container stabil
        run: |
          echo "Menunggu container stabil..."

          # Bot menunggu Ollama healthy sebelum start.
          # Poll hingga bot running, timeout 3 menit.
          TIMEOUT=180
          ELAPSED=0

          until docker inspect --format='{{.State.Running}}' aiagent_caddy 2>/dev/null | grep -q "true"; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo ""
              echo "TIMEOUT: caddy tidak running setelah ${TIMEOUT}s"
              echo ""
              echo "=== Log Ollama (tail 30) ==="
              docker logs aiagent_ollama --tail=30 2>&1 || true
              echo ""
              echo "=== Log Bot (tail 30) ==="
              docker logs aiagent_bot --tail=30 2>&1 || true
              echo ""
              echo "=== Log Caddy (tail 30) ==="
              docker logs aiagent_caddy --tail=30 2>&1 || true
              exit 1
            fi
            echo "  Menunggu... ${ELAPSED}s / ${TIMEOUT}s"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          echo "Caddy running setelah ${ELAPSED}s"

      - name: Cek semua container
        run: |
          check() {
            local name=$1
            local state
            state=$(docker inspect --format='{{.State.Running}}' "$name" 2>/dev/null || echo "false")
            if [ "$state" = "true" ]; then
              echo "OK  $name"
            else
              echo "FAIL $name (state: $state)"
              docker logs "$name" --tail=30 2>&1 || true
              return 1
            fi
          }

          echo "=== Status Container ==="
          check aiagent_ollama
          check aiagent_bot
          check aiagent_caddy
          echo "========================"
          echo "Semua container running. Deployment verified."

  # ── 4. Buat GitHub Release — hanya setelah verify sukses ───────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: octopus-cli-binaries
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            docker-compose.yml
            .env.example
            install.sh
            dist/octopus-linux-amd64
            dist/octopus-linux-arm64
            dist/octopus-darwin-amd64
            dist/octopus-darwin-arm64
            dist/octopus-windows-amd64.exe
            dist/octopus-install.sh
          body_prefix: |
            ## Install Octopus CLI

            One-liner (Linux & macOS):
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/octopus-cli/install.sh | bash
            ```

            Windows (PowerShell):
            ```powershell
            irm https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/octopus-windows-amd64.exe -OutFile octopus.exe
            Move-Item octopus.exe $env:LOCALAPPDATA\Programs\octopus\octopus.exe
            ```

            Lalu ketik `octopus` di terminal.

            ---

            ## Install Backend (VPS/Server)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            Atau pull image langsung:
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ---
